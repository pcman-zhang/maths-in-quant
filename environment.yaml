name: maths-in-quant
channels:
  - conda-forge
  - defaults
dependencies:
  # Python 版本
  - python=3.12

  # ==========================================
  # 核心科学计算栈（全书通用）
  # ==========================================
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - matplotlib>=3.7
  - seaborn>=0.12

  # ==========================================
  # 交互式开发环境
  # ==========================================
  - jupyter
  - ipykernel
  - ipywidgets

  # ==========================================
  # 统计与计量经济学（第7-12章、第19-22章）
  # ==========================================
  - statsmodels>=0.14

  # ==========================================
  # 优化理论（第16-18章）
  # ==========================================
  - cvxpy>=1.3

  # ==========================================
  # 机器学习（第27-29章）
  # ==========================================
  - scikit-learn>=1.3

  # ==========================================
  # 符号数学推导（辅助理解公式）
  # ==========================================
  - sympy>=1.12

  # ==========================================
  # 交互式可视化（可选，增强图表体验）
  # ==========================================
  - plotly>=5.15

  # ==========================================
  # 其他实用工具
  # ==========================================
  - numba>=0.57          # 加速数值计算（蒙特卡洛等）
  - joblib>=1.3          # 并行计算辅助
  - tqdm>=4.65           # 进度条

  # ==========================================
  # pip 补充包（conda-forge 未覆盖或版本滞后）
  # ==========================================
  - pip
  - pip:
    # 时间序列 / GARCH 建模（第21章）
    - arch>=6.0

    # 金融数据获取（附录C）
    - yfinance>=0.2
    - akshare>=1.11      # A股数据
    # - tushare>=1.2     # 如需使用，取消注释并配置 token

    # 回测框架（附录C，可选）
    # - backtrader>=1.9
    # - zipline-reloaded>=3.0

    # 自动微分（第3章辅助）
    # - jax[cpu]>=0.4    # 如需高性能自动微分，可安装

    # 格式化与代码质量（协作开发可选）
    # - black
    # - isort